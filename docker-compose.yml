version: '3.3'
volumes:
  media:
  pg_data:
  static:
services:
  db:
    image: postgres:13.10
    env_file: .env
    volumes:
      - pg_data:/var/lib/postgresql/data
  backend:
    container_name: foodgram-back
    restart: always
    build: ./backend/
    env_file: .env
    depends_on:
      - db
    volumes:
      - static:/backend_static
      - media:/app/media
    entrypoint: ["/ent_point.prod.sh"]
    command: ["gunicorn", "--bind", "0.0.0.0:8000", "foodgram_backend.wsgi"] 
  frontend:
    container_name: foodgram-front
    env_file: .env
    build: ./frontend/
    command: cp -r /app/build/. /frontend_static/
    volumes:
      - static:/frontend_static
  gateway:
    container_name: foodgram-proxy
    restart: always
    env_file: .env
    build: ./nginx/
    depends_on:
      - backend
      - frontend
    volumes:
      - static:/staticfiles
      - media:/media
    ports:
      - 9001:80
